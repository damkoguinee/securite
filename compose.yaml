services:

  ### DATABASE ###
  database:
    image: mysql:8.0
    container_name: symfony_mysql
    environment:
      MYSQL_DATABASE: securite
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: symfony
      MYSQL_PASSWORD: symfony
    ports:
      - "3307:3306"
    volumes:
      - database_data:/var/lib/mysql

  ### REDIS ###
  redis:
    image: redis:7-alpine
    container_name: symfony_redis
    ports:
      - "6379:6379"

  ### PHP ###
  php:
    build: .
    container_name: symfony_php
    volumes:
      - .:/var/www:delegated
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/php.ini
      - vendor_data:/var/www/vendor
    depends_on:
      - database
      - redis

  ### NGINX ###
  nginx:
    image: nginx:latest
    container_name: symfony_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www:delegated
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  ### PHPMYADMIN ###
  phpmyadmin:
    image: phpmyadmin
    container_name: symfony_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      PMA_USER: symfony
      PMA_PASSWORD: symfony
    depends_on:
      - database

volumes:
  database_data:
  vendor_data: